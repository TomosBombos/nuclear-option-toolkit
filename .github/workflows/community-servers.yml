name: Community servers

# Refreshes the "Community Servers" list in README.md from the public directory repo.
on:
  schedule:
    - cron: "17 * * * *"      # hourly
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: community-servers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render server list into README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVERS_REPO: TomosBombos/nuclear-option-servers
        run: python3 .github/scripts/render_servers.py README.md
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Update community server list [skip ci]"
            git push
          else
            echo "no change"
          fi
